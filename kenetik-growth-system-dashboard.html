<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenetik Growth System - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0b0d11;
            --bg-card: #12151c;
            --border: #1e2130;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --color-gray: #6b7280;
            --color-blue: #3b82f6;
            --color-green: #22c55e;
            --color-emerald: #10b981;
            --color-gold: #fbbf24;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        .header {
            padding: 24px 0 16px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--color-gold) 0%, var(--color-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-blue);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-button {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .filter-button:hover {
            border-color: var(--color-blue);
        }

        .filter-button.active {
            background: var(--color-blue);
            border-color: var(--color-blue);
            color: white;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .search-box::placeholder {
            color: var(--text-muted);
        }

        /* Roles Section */
        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 32px 0 16px 0;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        .roles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .role-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .role-card:hover {
            border-color: var(--color-blue);
            transform: translateY(-2px);
        }

        .role-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .role-emoji {
            font-size: 1.8rem;
        }

        .role-name {
            font-weight: 600;
            font-size: 1rem;
        }

        .role-human {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .role-mission {
            color: var(--text-secondary);
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .role-stats {
            display: flex;
            justify-content: space-around;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .stat-mini {
            text-align: center;
        }

        .stat-mini-value {
            font-weight: 600;
            font-size: 1.2rem;
        }

        .stat-mini-label {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .chip-group {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .chip {
            background: var(--border);
            color: var(--text-secondary);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            white-space: nowrap;
        }

        .chip-count {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Process Grid */
        .processes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
            margin-bottom: 32px;
        }

        .process-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .process-card:hover {
            border-color: var(--color-blue);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }

        .process-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .process-id {
            font-weight: 600;
            color: var(--color-gold);
        }

        .process-status {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-not_started {
            background: var(--border);
            color: var(--text-muted);
        }

        .status-in_progress {
            background: rgba(251, 191, 36, 0.2);
            color: var(--color-gold);
        }

        .status-built {
            background: rgba(34, 197, 94, 0.2);
            color: var(--color-green);
        }

        .status-live {
            background: rgba(59, 130, 246, 0.2);
            color: var(--color-blue);
        }

        .status-consolidated {
            background: rgba(16, 185, 129, 0.2);
            color: var(--color-emerald);
        }

        .process-name {
            font-weight: 500;
            font-size: 0.95rem;
            margin-bottom: 4px;
            word-break: break-word;
        }

        .process-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .process-notes {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .process-shortcut {
            display: inline-block;
            background: var(--border);
            color: var(--color-blue);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.75rem;
        }

        .progress-bar {
            background: var(--border);
            height: 4px;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, var(--color-gold), var(--color-blue));
            height: 100%;
            transition: width 0.3s;
        }

        /* Infrastructure Section */
        .infrastructure-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 32px;
        }

        .platform-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
        }

        .platform-name {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .health-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .health-operational {
            background: var(--color-green);
        }

        .health-offline {
            background: #ef4444;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
        }

        .modal-content {
            background-color: var(--bg-card);
            margin: 50px auto;
            padding: 20px;
            border: 1px solid var(--border);
            border-radius: 8px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .close {
            color: var(--text-secondary);
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: var(--text-primary);
        }

        .modal-section {
            margin-bottom: 16px;
        }

        .modal-section-title {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .modal-section-content {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .modal-meta {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .meta-item {
            padding: 8px;
            background: var(--bg-primary);
            border-radius: 4px;
        }

        .meta-label {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .meta-value {
            font-weight: 600;
            margin-top: 2px;
        }

        @media (max-width: 768px) {
            .roles-grid {
                grid-template-columns: 1fr;
            }

            .processes-grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.4rem;
            }

            .filter-button {
                padding: 6px 12px;
                font-size: 0.85rem;
            }

            .stat-mini {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Kenetik Growth System</h1>
            <p>Virtual Team Dashboard · v3.1 · 11 roles · 90 processes</p>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-number" id="stat-total">0</div>
                <div class="stat-label">Total Processes</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="stat-built">0</div>
                <div class="stat-label">Built</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="stat-in-progress">0</div>
                <div class="stat-label">In Progress</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="stat-not-started">0</div>
                <div class="stat-label">Not Started</div>
            </div>
        </div>

        <div class="filters">
            <div class="filter-group">
                <button class="filter-button active" data-filter="wave" data-value="all">All Waves</button>
                <button class="filter-button" data-filter="wave" data-value="1">Wave 1</button>
            </div>
            <div class="filter-group">
                <button class="filter-button active" data-filter="phase" data-value="all">All Phases</button>
                <button class="filter-button" data-filter="phase" data-value="1">Phase 1</button>
            </div>
            <div class="filter-group">
                <button class="filter-button active" data-filter="status" data-value="all">All Statuses</button>
                <button class="filter-button" data-filter="status" data-value="built">Built</button>
                <button class="filter-button" data-filter="status" data-value="in_progress">In Progress</button>
                <button class="filter-button" data-filter="status" data-value="not_started">Not Started</button>
            </div>
            <input type="text" class="search-box" id="search-input" placeholder="Search processes...">
        </div>

        <h2 class="section-title">Roles & Responsibilities</h2>
        <div class="roles-grid" id="roles-container"></div>

        <h2 class="section-title">Processes</h2>
        <div class="processes-grid" id="processes-container"></div>

        <h2 class="section-title">Infrastructure & Integrations</h2>
        <div class="infrastructure-grid" id="infrastructure-container"></div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modal-title"></h2>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        // Load SYSTEM_STATE from two external JSON files:
        //   system-state.json — lightweight state (statuses, roles, infrastructure)
        //   system-state-definitions.json — full process definitions (steps, inputs, outputs)
        let SYSTEM_STATE = {};

        async function loadSystemState() {
            try {
                const [stateRes, defsRes] = await Promise.all([
                    fetch('./system-state.json'),
                    fetch('./system-state-definitions.json')
                ]);
                if (!stateRes.ok) throw new Error(`State file: HTTP ${stateRes.status}`);
                if (!defsRes.ok) throw new Error(`Definitions file: HTTP ${defsRes.status}`);

                const state = await stateRes.json();
                const defs = await defsRes.json();

                // Merge: state is the base, definitions fill in process details
                SYSTEM_STATE = state;
                for (const [pid, defn] of Object.entries(defs.processes || {})) {
                    if (SYSTEM_STATE.processes[pid]) {
                        Object.assign(SYSTEM_STATE.processes[pid], defn);
                    }
                }
                initDashboard();
            } catch (err) {
                console.error('Failed to load system state:', err);
                document.querySelector('.container').innerHTML =
                    '<div style="color: #ef4444; padding: 40px; text-align: center;">' +
                    '<h2>Failed to load system state</h2>' +
                    '<p>Make sure system-state.json and system-state-definitions.json are in the same directory as this file.</p>' +
                    '<p style="color: #94a3b8; margin-top: 8px;">Error: ' + err.message + '</p></div>';
            }
        }

        // Global filter state
        let currentFilters = {
            wave: 'all',
            phase: 'all',
            status: 'all',
            search: ''
        };

        function initDashboard() {
            const infra = SYSTEM_STATE.infrastructure;

            // Compute stats from processes (resilient — never depends on a stats key)
            const processes = Object.values(SYSTEM_STATE.processes || {});
            const stats = SYSTEM_STATE.stats || {
                total_processes: processes.length,
                built: processes.filter(p => p.status === 'built').length,
                in_progress: processes.filter(p => p.status === 'in_progress').length,
                not_started: processes.filter(p => p.status === 'not_started').length,
                live: processes.filter(p => p.status === 'live').length
            };

            // Update stats
            document.getElementById('stat-total').textContent = stats.total_processes || processes.length;
            document.getElementById('stat-built').textContent = (stats.built || 0) + (stats.live || 0);
            document.getElementById('stat-in-progress').textContent = stats.in_progress || 0;
            document.getElementById('stat-not-started').textContent = stats.not_started || 0;

            // Render roles
            Object.keys(SYSTEM_STATE.roles).forEach(roleId => {
                const role = SYSTEM_STATE.roles[roleId];
                renderRole(role);
            });

            // Render processes
            renderProcesses();

            // Render infrastructure
            if (infra && infra.platforms) {
                Object.entries(infra.platforms).forEach(([name, platform]) => {
                    renderPlatform(name, platform);
                });
            }

            // Setup event listeners
            setupEventListeners();
        }

        function renderRole(role) {
            const rolesContainer = document.getElementById('roles-container');
            const stats = role.stats || { total: 0, not_started: 0, in_progress: 0, built: 0, live: 0, consolidated: 0 };

            const card = document.createElement('div');
            card.className = 'role-card';
            card.innerHTML = `
                <div class="role-header">
                    <div class="role-emoji">${role.emoji || ''}</div>
                    <div>
                        <div class="role-name">${role.name}</div>
                        <div class="role-human">${role.human || 'TBD'}</div>
                    </div>
                </div>
                <div class="role-mission">${role.mission || ''}</div>
                <div class="role-stats">
                    <div class="stat-mini">
                        <div class="stat-mini-value">${stats.total}</div>
                        <div class="stat-mini-label">Total</div>
                    </div>
                    <div class="stat-mini">
                        <div class="stat-mini-value">${stats.built}</div>
                        <div class="stat-mini-label">Built</div>
                    </div>
                    <div class="stat-mini">
                        <div class="stat-mini-value">${stats.in_progress}</div>
                        <div class="stat-mini-label">In Progress</div>
                    </div>
                </div>
                <div class="chip-group">
                    ${(role.processes || []).map(procId => `<span class="chip">${procId}</span>`).join('')}
                </div>
            `;
            rolesContainer.appendChild(card);
        }

        function getProcessStatus(processId) {
            const roleKey = Object.keys(SYSTEM_STATE.roles).find(rk => {
                const role = SYSTEM_STATE.roles[rk];
                return role.processes && role.processes.includes(processId);
            });

            let status = 'not_started';
            if (roleKey) {
                const role = SYSTEM_STATE.roles[roleKey];
                if (role.processes && role.processes.includes(processId)) {
                    // Get from process definition
                    if (SYSTEM_STATE.processes && SYSTEM_STATE.processes[processId]) {
                        status = SYSTEM_STATE.processes[processId].status || status;
                    }
                }
            }
            return status;
        }

        function renderProcesses() {
            const processesContainer = document.getElementById('processes-container');
            processesContainer.innerHTML = '';

            Object.values(SYSTEM_STATE.processes).forEach(process => {
                if (matchesFilters(process)) {
                    renderProcess(process);
                }
            });
        }

        function renderProcess(process) {
            const processesContainer = document.getElementById('processes-container');

            const card = document.createElement('div');
            card.className = 'process-card';
            card.addEventListener('click', () => showProcessModal(process));

            const progressPercent = process.progress || 0;
            const statusClass = `status-${process.status}`;

            card.innerHTML = `
                <div class="process-header">
                    <span class="process-id">${process.id}</span>
                    <span class="process-status ${statusClass}">${process.status?.replace('_', ' ').toUpperCase()}</span>
                </div>
                <div class="process-name">${process.name}</div>
                <div class="process-meta">Wave ${process.wave} • Phase ${process.phase}</div>
                ${process.notes ? `<div class="process-notes">${process.notes.substring(0, 100)}${process.notes.length > 100 ? '...' : ''}</div>` : ''}
                ${process.shortcut ? `<span class="process-shortcut">${process.shortcut}</span>` : ''}
                ${process.progress !== undefined ? `
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${progressPercent}%"></div>
                    </div>
                ` : ''}
            `;

            processesContainer.appendChild(card);
        }

        function showProcessModal(process) {
            const modal = document.getElementById('modal');
            const modalTitle = document.getElementById('modal-title');
            const modalBody = document.getElementById('modal-body');

            modalTitle.textContent = `${process.id} - ${process.name}`;

            let content = `
                <div class="modal-meta">
                    <div class="meta-item">
                        <div class="meta-label">Status</div>
                        <div class="meta-value">${process.status?.replace('_', ' ').toUpperCase()}</div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-label">Wave</div>
                        <div class="meta-value">${process.wave}</div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-label">Phase</div>
                        <div class="meta-value">${process.phase || 'TBD'}</div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-label">Progress</div>
                        <div class="meta-value">${process.progress !== undefined ? process.progress + '%' : 'N/A'}</div>
                    </div>
                </div>
            `;

            if (process.shortcut) {
                content += `
                    <div class="modal-section">
                        <div class="modal-section-title">Shortcut</div>
                        <div class="modal-section-content"><code>${process.shortcut}</code></div>
                    </div>
                `;
            }

            if (process.role) {
                content += `
                    <div class="modal-section">
                        <div class="modal-section-title">Owner</div>
                        <div class="modal-section-content">${process.role}</div>
                    </div>
                `;
            }

            if (process.buildType) {
                content += `
                    <div class="modal-section">
                        <div class="modal-section-title">Build Type</div>
                        <div class="modal-section-content">${process.buildType}</div>
                    </div>
                `;
            }

            if (process.notes) {
                content += `
                    <div class="modal-section">
                        <div class="modal-section-title">Notes</div>
                        <div class="modal-section-content">${process.notes}</div>
                    </div>
                `;
            }

            if (process.description) {
                content += `
                    <div class="modal-section">
                        <div class="modal-section-title">Description</div>
                        <div class="modal-section-content">${process.description}</div>
                    </div>
                `;
            }

            modalBody.innerHTML = content;
            modal.style.display = 'block';
        }

        function renderPlatform(name, platform) {
            const infraContainer = document.getElementById('infrastructure-container');

            const card = document.createElement('div');
            card.className = 'platform-card';

            const healthClass = platform.health === 'operational' ? 'health-operational' : 'health-offline';
            const status = platform.health === 'operational' ? 'Operational' : `Offline (${platform.reason || 'Unknown'})`;

            card.innerHTML = `
                <div class="platform-name">
                    <span class="health-indicator ${healthClass}"></span>
                    ${name.replace('_', ' ').toUpperCase()}
                </div>
                <div style="font-size: 0.85rem; color: var(--text-secondary);">
                    ${status}<br>
                    <span style="color: var(--text-muted); font-size: 0.8rem;">
                        ${platform.lastSync ? `Last sync: ${new Date(platform.lastSync).toLocaleDateString()}` : 'Never synced'}
                    </span>
                </div>
            `;

            infraContainer.appendChild(card);
        }

        function matchesFilters(process) {
            // Wave filter
            if (currentFilters.wave !== 'all' && process.wave != currentFilters.wave) {
                return false;
            }

            // Phase filter
            if (currentFilters.phase !== 'all' && process.phase != currentFilters.phase) {
                return false;
            }

            // Status filter
            if (currentFilters.status !== 'all' && process.status !== currentFilters.status) {
                return false;
            }

            // Search filter
            if (currentFilters.search) {
                const searchLower = currentFilters.search.toLowerCase();
                if (!process.id.toLowerCase().includes(searchLower) &&
                    !process.name.toLowerCase().includes(searchLower)) {
                    return false;
                }
            }

            return true;
        }

        function setupEventListeners() {
            // Filter buttons
            document.querySelectorAll('.filter-button').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const filter = e.target.dataset.filter;
                    const value = e.target.dataset.value;

                    // Remove active class from same filter group
                    document.querySelectorAll(`[data-filter="${filter}"]`).forEach(b => {
                        b.classList.remove('active');
                    });

                    // Add active class to clicked button
                    e.target.classList.add('active');

                    // Update filters
                    currentFilters[filter] = value;

                    // Re-render
                    renderProcesses();
                });
            });

            // Search input
            document.getElementById('search-input').addEventListener('input', (e) => {
                currentFilters.search = e.target.value;
                renderProcesses();
            });

            // Modal close
            document.querySelector('.close').addEventListener('click', () => {
                document.getElementById('modal').style.display = 'none';
            });

            window.addEventListener('click', (e) => {
                const modal = document.getElementById('modal');
                if (e.target === modal) {
                    modal.style.display = 'none';
                }
            });
        }

        // Load on page load
        loadSystemState();
    </script>
</body>
</html>
